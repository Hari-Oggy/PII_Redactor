# =============================================================================
# PII Redactor Gateway — Configuration (v3)
# =============================================================================

server:
  proxy_addr: ":8080"
  admin_addr: "127.0.0.1:9090"
  read_timeout: "30s"
  write_timeout: "120s"
  idle_timeout: "60s"
  shutdown_timeout: "15s"
  max_concurrency: 10000
  max_body_bytes: 10485760    # 10 MB
  # tls_cert_file: ""         # uncomment for mTLS
  # tls_key_file: ""
  # tls_client_ca_file: ""

proxy:
  upstream_timeout: "120s"
  providers:
    - name: "openai"
      base_url: "https://api.openai.com"
      api_key_env: "OPENAI_API_KEY"
      path_prefix: "/openai"
      circuit_breaker:
        max_failures: 5
        timeout: "30s"
        max_half_open: 3

    - name: "anthropic"
      base_url: "https://api.anthropic.com"
      api_key_env: "ANTHROPIC_API_KEY"
      path_prefix: "/anthropic"
      circuit_breaker:
        max_failures: 5
        timeout: "30s"
        max_half_open: 3

    - name: "azure"
      base_url: "https://your-resource.openai.azure.com"
      api_key_env: "AZURE_OPENAI_API_KEY"
      path_prefix: "/azure"
      circuit_breaker:
        max_failures: 5
        timeout: "30s"
        max_half_open: 3

    - name: "gemini"
      base_url: "https://generativelanguage.googleapis.com"
      api_key_env: "GEMINI_API_KEY"
      path_prefix: "/gemini"
      circuit_breaker:
        max_failures: 5
        timeout: "30s"
        max_half_open: 3

pii:
  confidence_threshold: 0.8
  regex_timeout: "50ms"
  overlap_buffer_size: 128
  scan_query_params: true
  scan_headers:
    - "X-User-Email"
    - "X-User-Name"
    - "X-Forwarded-For"
  blocklist:
    - "CONFIDENTIAL"
    - "TOP SECRET"
  allowlist:
    - "example.com"
    - "test@test.com"

auth:
  enabled: false                # set true in production
  jwt_secret: ""
  jwt_public_key_file: ""
  api_keys: []

admin:
  enabled: true
  api_key: "admin-secret-key"   # change in production

logging:
  level: "info"
  format: "json"

metrics:
  enabled: true
  path: "/metrics"
